name: Release-plz

# Sole trigger: manual dispatch via `./scripts/release.sh` or the Actions tab.
# Pushes to develop/main do NOT trigger any release-plz activity — releases are
# gated entirely behind `scripts/release.sh` (which calls `gh workflow run`).
on:
  workflow_dispatch:
    inputs:
      command:
        description: "release-plz command to run"
        required: true
        default: "release-pr"
        type: choice
        options:
          - release-pr
          - release

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Publish + tag + GitHub Release. Fires only on manual `release` dispatch
  # (invoked by `scripts/release.sh` after develop has been promoted to main).
  # ──────────────────────────────────────────────────────────────────────
  release-plz-release:
    name: Release-plz release (publish)
    if: >-
      github.event_name == 'workflow_dispatch' && inputs.command == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write # push tags, create GitHub releases
      pull-requests: read # detect the release PR and its commits
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # release-plz needs full git history
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────
  # Maintain the "Prepare release vX.Y.Z" PR. Fires only on manual
  # `release-pr` dispatch (invoked by `scripts/release.sh` step 1).
  # ──────────────────────────────────────────────────────────────────────
  release-plz-pr:
    name: Release-plz PR
    if: >-
      github.event_name == 'workflow_dispatch' && inputs.command == 'release-pr'
    runs-on: ubuntu-latest
    permissions:
      contents: write # push to the release-pr branch
      pull-requests: write # create / update the release PR
    concurrency:
      # Only one release-pr job per branch at a time — prevents PR conflicts.
      # cancel-in-progress: false → never skip an pending update.
      group: release-plz-pr-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Only needed if you use a private registry; safe to leave for crates.io.
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
